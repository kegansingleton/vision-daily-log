<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Vision Mechanical — Absence / Sick Request</title>
<style>
:root{--vm:#c0392b;--vm2:#7f1d1d;--ink:#1f2937;--mut:#6b7280;--line:#e5e7eb;--bg:#f4f5f7;--ok:#15803d;--okbg:#dcfce7}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%}
header{background:linear-gradient(135deg,var(--vm),var(--vm2));color:#fff;padding:14px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header .row{display:flex;align-items:center;gap:12px}
header img{height:38px;width:auto;background:#fff;border-radius:8px;padding:4px 6px;box-shadow:0 1px 3px rgba(0,0,0,.2);flex:0 0 auto}
header h1{margin:0;font-size:18px;font-weight:700}
header .who{font-size:12px;opacity:.9;margin-top:2px}
.wrap{max-width:680px;margin:0 auto;padding:14px 12px 120px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{margin:0 0 10px;font-size:15px;font-weight:700;color:var(--vm2);display:flex;align-items:center;gap:8px}
.card h2 .n{background:var(--vm);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 auto}
label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin:8px 0 4px}
input[type=date],input[type=text],select,textarea{width:100%;padding:11px;font-size:16px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-family:inherit}
textarea{min-height:90px;resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.opt{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:9px 15px;font-size:14px;cursor:pointer;user-select:none}
.opt.sel{background:var(--vm);border-color:var(--vm);color:#fff;font-weight:600}
.hint{font-size:12px;color:var(--mut);margin-top:6px}
.req{color:var(--vm)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;background:var(--vm);color:#fff}
.btn:disabled{opacity:.5}
.foot{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 12px;z-index:40}
.foot .inner{max-width:680px;margin:0 auto}
.gate{position:fixed;inset:0;background:linear-gradient(135deg,var(--vm),var(--vm2));display:flex;align-items:center;justify-content:center;z-index:100;color:#fff;text-align:center;padding:24px}
.gate .box{max-width:340px}.gate img{height:74px;width:auto;background:#fff;border-radius:12px;padding:8px 12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.gate h1{font-size:22px;margin:0 0 6px}.gate p{opacity:.9;font-size:14px;margin:0 0 20px}
.gate button{background:#fff;color:var(--vm2);border:none;border-radius:10px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer}
.msg{padding:12px;border-radius:9px;font-size:14px;margin:10px 0;display:none}
.msg.ok{background:var(--okbg);color:var(--ok);display:block}.msg.err{background:#fde8e8;color:#b91c1c;display:block}
</style>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"></script>
</head>
<body>
<div id="gate" class="gate"><div class="box">
  <img src="https://img1.wsimg.com/isteam/ip/758c2db3-5548-4484-9c69-07d1b4315f5e/logo%20main%20jpg.jpg/:/rs=h:140,m/qt=q:92" alt="Vision Mechanical">
  <h1>Vision Mechanical</h1><p>Absence / Sick Request. Sign in with your Vision Mechanical account.</p>
  <button id="signin">Sign in with Microsoft</button><div id="gateMsg" style="margin-top:14px;font-size:13px;opacity:.9"></div>
</div></div>
<header><div class="row">
  <img src="https://img1.wsimg.com/isteam/ip/758c2db3-5548-4484-9c69-07d1b4315f5e/logo%20main%20jpg.jpg/:/rs=h:96,m/qt=q:92" alt="Vision Mechanical">
  <div><h1>Absence / Sick Request</h1><div class="who" id="who"></div></div>
</div></header>
<div class="wrap" id="app" style="display:none">
  <div class="card">
    <h2><span class="n">1</span> Employee</h2>
    <label>Employee name <span class="req">*</span></label><input type="text" id="empName">
    <div class="grid2">
      <div><label>Employee number</label><input type="text" id="empNum"></div>
      <div><label>Department</label><input type="text" id="dept" placeholder="e.g. Sheet Metal"></div>
    </div>
    <label>Manager <span class="req">*</span></label><input type="text" id="manager" placeholder="Who approves this request">
  </div>
  <div class="card">
    <h2><span class="n">2</span> Type of absence <span class="req">*</span></h2>
    <div class="opts" id="typeOpts"></div>
  </div>
  <div class="card">
    <h2><span class="n">3</span> Dates <span class="req">*</span></h2>
    <div class="grid2">
      <div><label>From</label><input type="date" id="dFrom"></div>
      <div><label>To</label><input type="date" id="dTo"></div>
    </div>
    <div class="hint">Requests other than sick leave should be submitted at least one month before the first day of absence.</div>
  </div>
  <div class="card">
    <h2><span class="n">4</span> Reason</h2>
    <textarea id="reason" placeholder="Reason for absence"></textarea>
  </div>
  <div class="msg" id="msg"></div>
</div>
<div class="foot" id="foot" style="display:none"><div class="inner"><button class="btn" id="submitBtn">Submit request</button></div></div>
<script>
var GRAPH_SCOPE="https://graph.microsoft.com/Sites.ReadWrite.All";
var SITE="visionmech.sharepoint.com,ccfe4256-b2bf-4a3b-8e37-50f8021bb3b2,acce7714-1643-4364-86e0-8641745e0281";
var LIST="be65e5a7-28b0-4b9b-a9b5-c8f4387f71e4";
var GRAPH_ITEMS_URL="https://graph.microsoft.com/v1.0/sites/"+SITE+"/lists/"+LIST+"/items";
var MSAL_CONFIG={auth:{clientId:"ece3c8e3-0f54-49dc-bf83-b46411ade0aa",authority:"https://login.microsoftonline.com/8d64d0b9-91ba-4959-a83c-2e7e8cf233b3",redirectUri:(window.location.origin+window.location.pathname)},cache:{cacheLocation:"localStorage"}};
var msal_i=new msal.PublicClientApplication(MSAL_CONFIG);var loginEmail="";
var TYPES=["Sick","Vacation","Bereavement","Union Sick Pay","Military","Jury Duty","Maternity/Paternity","Other"];var absType="";
function E(id){return document.getElementById(id);}
function renderTypes(){var h="";TYPES.forEach(function(t){h+='<div class="opt'+(absType===t?' sel':'')+'" data-t="'+t+'">'+t+'</div>';});E("typeOpts").innerHTML=h;E("typeOpts").querySelectorAll(".opt").forEach(function(o){o.onclick=function(){absType=o.getAttribute("data-t");renderTypes();};});}
function showApp(a){E("gate").style.display="none";E("app").style.display="block";E("foot").style.display="block";E("who").textContent=a.username||"";loginEmail=a.username||"";if(!E("empName").value)E("empName").value=(a.name||"").trim();renderTypes();}
function start(){msal_i.handleRedirectPromise().then(function(){var a=msal_i.getAllAccounts()[0];if(a){msal_i.setActiveAccount(a);showApp(a);}}).catch(function(e){E("gateMsg").textContent="Sign-in problem: "+String(e);});}
E("signin").onclick=function(){msal_i.loginRedirect({scopes:["openid","profile","email",GRAPH_SCOPE]});};
function buildText(a){return ["VISION MECHANICAL - ABSENCE / SICK REQUEST","========================================","Employee: "+a.empName+"  (#"+a.empNum+")","Department: "+a.dept,"Manager: "+a.manager,"Type: "+a.absType,"Dates: "+a.dFrom+" to "+a.dTo,"","Reason: "+a.reason,"","Status: Pending manager approval","Submitted: "+a.submittedAt+" by "+a.loginEmail,"========================================"].join("\n");}
function submitReq(){
  var msg=E("msg"),btn=E("submitBtn");
  if(!E("empName").value.trim()){msg.className="msg err";msg.textContent="Enter employee name";return;}
  if(!E("manager").value.trim()){msg.className="msg err";msg.textContent="Enter manager";return;}
  if(!absType){msg.className="msg err";msg.textContent="Pick a type of absence";return;}
  if(!E("dFrom").value||!E("dTo").value){msg.className="msg err";msg.textContent="Pick from and to dates";return;}
  var a={empName:E("empName").value.trim(),empNum:E("empNum").value.trim(),dept:E("dept").value.trim(),manager:E("manager").value.trim(),absType:absType,dFrom:E("dFrom").value,dTo:E("dTo").value,reason:E("reason").value.trim(),loginEmail:loginEmail,submittedAt:new Date().toLocaleString()};
  var fields={Title:a.empName+" | "+a.absType+" | "+a.dFrom,EmployeeName:a.empName,EmployeeNumber:a.empNum,Department:a.dept,Manager:a.manager,AbsenceType:a.absType,DateFrom:a.dFrom+"T12:00:00Z",DateFromText:a.dFrom,DateTo:a.dTo+"T12:00:00Z",DateToText:a.dTo,Reason:a.reason,ApprovalStatus:"Pending",SubmittedBy:a.loginEmail,SubmittedAt:a.submittedAt,ReportText:buildText(a)};
  btn.disabled=true;msg.className="msg ok";msg.textContent="Submitting request...";
  var acct=msal_i.getActiveAccount()||msal_i.getAllAccounts()[0];
  msal_i.acquireTokenSilent({scopes:[GRAPH_SCOPE],account:acct}).catch(function(){msal_i.acquireTokenRedirect({scopes:[GRAPH_SCOPE]});return new Promise(function(){});}).then(function(tok){return fetch(GRAPH_ITEMS_URL,{method:"POST",headers:{Authorization:"Bearer "+tok.accessToken,"Content-Type":"application/json"},body:JSON.stringify({fields:fields})});}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,200));});return r.json();}).then(function(){msg.className="msg ok";msg.textContent="Submitted. Your request has been sent for approval.";btn.textContent="Submitted";}).catch(function(e){msg.className="msg err";msg.textContent="Could not submit ("+e.message+"). Try again.";btn.disabled=false;});
}
E("submitBtn").onclick=submitReq;start();
</script>
</body>
</html>
