<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Vision Mechanical — Piping Pressure Test</title>
<style>
:root{--vm:#c0392b;--vm2:#7f1d1d;--ink:#1f2937;--mut:#6b7280;--line:#e5e7eb;--bg:#f4f5f7;--ok:#15803d;--okbg:#dcfce7}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%}
header{background:linear-gradient(135deg,var(--vm),var(--vm2));color:#fff;padding:14px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header .row{display:flex;align-items:center;gap:12px}
header img{height:38px;width:auto;background:#fff;border-radius:8px;padding:4px 6px;box-shadow:0 1px 3px rgba(0,0,0,.2);flex:0 0 auto}
header h1{margin:0;font-size:18px;font-weight:700}header .who{font-size:12px;opacity:.9;margin-top:2px}
.wrap{max-width:700px;margin:0 auto;padding:14px 12px 120px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{margin:0 0 10px;font-size:15px;font-weight:700;color:var(--vm2);display:flex;align-items:center;gap:8px}
label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin:8px 0 4px}
input[type=date],input[type=text]{width:100%;padding:11px;font-size:16px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-family:inherit}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chk{display:flex;align-items:flex-start;gap:9px;padding:9px 4px;font-size:14.5px;cursor:pointer;border-bottom:1px solid #f1f2f4}
.chk:last-of-type{border-bottom:0}
.chk input{width:20px;height:20px;margin-top:1px;flex:0 0 auto}
.dur{font-size:12px;color:var(--mut);margin:2px 0 8px 2px}
.req{color:var(--vm)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;background:var(--vm);color:#fff}
.btn:disabled{opacity:.5}
.foot{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 12px;z-index:40}
.foot .inner{max-width:700px;margin:0 auto}
.note{font-size:12px;color:var(--vm2);text-align:center;margin:6px 0}
.gate{position:fixed;inset:0;background:linear-gradient(135deg,var(--vm),var(--vm2));display:flex;align-items:center;justify-content:center;z-index:100;color:#fff;text-align:center;padding:24px}
.gate .box{max-width:340px}.gate img{height:74px;width:auto;background:#fff;border-radius:12px;padding:8px 12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.gate h1{font-size:22px;margin:0 0 6px}.gate p{opacity:.9;font-size:14px;margin:0 0 20px}
.gate button{background:#fff;color:var(--vm2);border:none;border-radius:10px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer}
.msg{padding:12px;border-radius:9px;font-size:14px;margin:10px 0;display:none}
.msg.ok{background:var(--okbg);color:var(--ok);display:block}.msg.err{background:#fde8e8;color:#b91c1c;display:block}
</style>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"></script>
</head>
<body>
<div id="gate" class="gate"><div class="box">
  <img src="https://img1.wsimg.com/isteam/ip/758c2db3-5548-4484-9c69-07d1b4315f5e/logo%20main%20jpg.jpg/:/rs=h:140,m/qt=q:92" alt="Vision Mechanical">
  <h1>Vision Mechanical</h1><p>Piping Pressure Test Verification. Sign in with your Vision Mechanical account.</p>
  <button id="signin">Sign in with Microsoft</button><div id="gateMsg" style="margin-top:14px;font-size:13px;opacity:.9"></div>
</div></div>
<header><div class="row">
  <img src="https://img1.wsimg.com/isteam/ip/758c2db3-5548-4484-9c69-07d1b4315f5e/logo%20main%20jpg.jpg/:/rs=h:96,m/qt=q:92" alt="Vision Mechanical">
  <div><h1>Piping Pressure Test</h1><div class="who" id="who"></div></div>
</div></header>
<div class="wrap" id="app" style="display:none">
  <div class="card">
    <h2><span class="n">1</span> Job</h2>
    <label>Pick job</label>
    <select id="jobPick"><option value="">-- Pick a job (or type below) --</option></select>
    <label>Job name <span class="req">*</span></label><input type="text" id="jobName">
    <div class="grid2">
      <div><label>Job #</label><input type="text" id="jobNo"></div>
      <div><label>Date <span class="req">*</span></label><input type="date" id="testDate"></div>
    </div>
  </div>
  <div id="systems"></div>
  <div class="card">
    <h2><span class="n">7</span> Sign-off</h2>
    <label>Vision foreman <span class="req">*</span></label><input type="text" id="foreman">
    <label>General contractor rep</label><input type="text" id="gc">
    <div class="note">** NOT to be used for Med-Gas testing. QCP 22.02 Form.</div>
  </div>
  <div class="msg" id="msg"></div>
</div>
<div class="foot" id="foot" style="display:none"><div class="inner"><button class="btn" id="submitBtn">Submit test verification</button></div></div>
<script>
var GRAPH_SCOPE="https://graph.microsoft.com/Sites.ReadWrite.All";
var SITE="visionmech.sharepoint.com,ccfe4256-b2bf-4a3b-8e37-50f8021bb3b2,acce7714-1643-4364-86e0-8641745e0281";
var LIST="4a73433e-57e4-4589-addb-c63d9c49e716";
var GRAPH_ITEMS_URL="https://graph.microsoft.com/v1.0/sites/"+SITE+"/lists/"+LIST+"/items";
/* --- Live job list (same source the timecards pull from) --- */
var JOBS_URL="https://graph.microsoft.com/v1.0/sites/"+SITE+"/lists/192b6fd5-5a12-47c1-9d1b-ba4b51e13371/items?$expand=fields($select=JobNo,JobName,Active)&$top=999";
function fillJobPick(arr){var s=document.getElementById("jobPick");if(!s)return;var e=function(x){return String(x).replace(/"/g,'&quot;').replace(/</g,'&lt;');};s.innerHTML='<option value="">-- Pick a job (or type below) --</option>'+arr.map(function(x){return '<option value="'+e(x)+'">'+e(x)+'</option>';}).join("");s.onchange=function(){var v=s.value;if(!v)return;var i=v.indexOf(" ");E("jobNo").value=i>0?v.slice(0,i):v;E("jobName").value=i>0?v.slice(i+1):"";};}
function loadJobPicks(){var acct=msal_i.getActiveAccount()||msal_i.getAllAccounts()[0];if(!acct)return;msal_i.acquireTokenSilent({scopes:[GRAPH_SCOPE],account:acct}).then(function(tok){var seen={},arr=[];function page(u){return fetch(u,{headers:{Authorization:"Bearer "+tok.accessToken}}).then(function(r){return r.json();}).then(function(j){(j.value||[]).forEach(function(it){var fl=it.fields||{};if((fl.Active||"Yes")==="No")return;var jn=(fl.JobNo||"").trim();if(!jn||seen[jn])return;seen[jn]=1;arr.push(jn+" "+(fl.JobName||"").trim());});if(j["@odata.nextLink"])return page(j["@odata.nextLink"]);});}return page(JOBS_URL).then(function(){arr.sort();fillJobPick(arr);});}).catch(function(){});}
var MSAL_CONFIG={auth:{clientId:"ece3c8e3-0f54-49dc-bf83-b46411ade0aa",authority:"https://login.microsoftonline.com/8d64d0b9-91ba-4959-a83c-2e7e8cf233b3",redirectUri:(window.location.origin+window.location.pathname)},cache:{cacheLocation:"localStorage"}};
var msal_i=new msal.PublicClientApplication(MSAL_CONFIG);var loginEmail="";
var SYS=[
 {name:"DWV (Below Ground)",opts:["Tested with air @ 5 p.s.i.","Tested with water @ 10 ft head"]},
 {name:"DWV (Above Ground)",opts:["Tested with air @ 5 p.s.i.","Tested with water @ 10 ft head"]},
 {name:"Domestic Water",opts:["Tested with air @ min. 150 p.s.i.","Tested hydrostatically @ min. 150 p.s.i."]},
 {name:"Natural Gas / Propane",opts:["Screw pipe tested @ 10 p.s.i.","Weld pipe tested @ 60 p.s.i."]},
 {name:"Hydronic Piping",opts:["Copper tested with air @ min. 150 p.s.i.","Steel tested with air @ min. 200 p.s.i.","Tested hydrostatically @ min. 150 p.s.i."]}
];
function E(id){return document.getElementById(id);}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function renderSys(){
  var h="";
  SYS.forEach(function(s,i){
    h+='<div class="card"><h2><span class="n">'+(i+2)+'</span> '+esc(s.name)+'</h2>';
    s.opts.forEach(function(o,j){h+='<label class="chk"><input type="checkbox" data-s="'+i+'" data-o="'+j+'"><span>'+esc(o)+'</span></label>';});
    h+='<div class="dur">Duration: system under test for 2 hrs (if tested)</div>';
    h+='<label>Area tested</label><input type="text" data-area="'+i+'" placeholder="Leave blank if this system was not tested"></div>';
  });
  E("systems").innerHTML=h;
}
function showApp(a){E("gate").style.display="none";E("app").style.display="block";E("foot").style.display="block";E("who").textContent=a.username||"";loginEmail=a.username||"";if(!E("foreman").value)E("foreman").value=(a.name||"").trim();if(!E("testDate").value)E("testDate").value=today();renderSys();loadJobPicks();}
function start(){msal_i.handleRedirectPromise().then(function(){var a=msal_i.getAllAccounts()[0];if(a){msal_i.setActiveAccount(a);showApp(a);}}).catch(function(e){E("gateMsg").textContent="Sign-in problem: "+String(e);});}
E("signin").onclick=function(){msal_i.loginRedirect({scopes:["openid","profile","email",GRAPH_SCOPE]});};
function collect(){
  var out=[];
  SYS.forEach(function(s,i){
    var tests=[];s.opts.forEach(function(o,j){var c=document.querySelector('[data-s="'+i+'"][data-o="'+j+'"]');if(c&&c.checked)tests.push(o);});
    var area=(document.querySelector('[data-area="'+i+'"]')||{}).value||"";area=area.trim();
    if(tests.length||area)out.push({system:s.name,tests:tests,area:area});
  });
  return out;
}
function buildText(a){
  var L=["VISION MECHANICAL - PIPING PRESSURE TEST VERIFICATION (QCP 22.02)","========================================","Job: "+a.jobName+"  #"+a.jobNo,"Date: "+a.testDate,""];
  a.systems.forEach(function(s){L.push("-- "+s.system+" --");s.tests.forEach(function(t){L.push("  [X] "+t+"  (2 hrs)");});L.push("  Area tested: "+(s.area||"-"));L.push("");});
  L.push("Vision Foreman: "+a.foreman);L.push("General Contractor Rep: "+a.gc);L.push("** NOT to be used for Med-Gas Testing.");
  L.push("Submitted: "+a.submittedAt+" by "+a.loginEmail);L.push("========================================");return L.join("\n");
}
function submitTest(){
  var msg=E("msg"),btn=E("submitBtn");
  if(!E("jobName").value.trim()){msg.className="msg err";msg.textContent="Enter job name";return;}
  if(!E("testDate").value){msg.className="msg err";msg.textContent="Pick the date";return;}
  if(!E("foreman").value.trim()){msg.className="msg err";msg.textContent="Enter Vision foreman";return;}
  var sys=collect();
  if(sys.length===0){msg.className="msg err";msg.textContent="Mark at least one system as tested";return;}
  var a={jobName:E("jobName").value.trim(),jobNo:E("jobNo").value.trim(),testDate:E("testDate").value,foreman:E("foreman").value.trim(),gc:E("gc").value.trim(),systems:sys,loginEmail:loginEmail,submittedAt:new Date().toLocaleString()};
  var fields={Title:a.testDate+" | "+a.jobName,JobName:a.jobName,JobNo:a.jobNo,TestDate:a.testDate+"T12:00:00Z",TestDateText:a.testDate,ForemanName:a.foreman,GCRep:a.gc,Systems:JSON.stringify(a.systems),SubmittedBy:a.loginEmail,SubmittedAt:a.submittedAt,ReportText:buildText(a)};
  btn.disabled=true;msg.className="msg ok";msg.textContent="Submitting...";
  var acct=msal_i.getActiveAccount()||msal_i.getAllAccounts()[0];
  msal_i.acquireTokenSilent({scopes:[GRAPH_SCOPE],account:acct}).catch(function(){msal_i.acquireTokenRedirect({scopes:[GRAPH_SCOPE]});return new Promise(function(){});}).then(function(tok){return fetch(GRAPH_ITEMS_URL,{method:"POST",headers:{Authorization:"Bearer "+tok.accessToken,"Content-Type":"application/json"},body:JSON.stringify({fields:fields})});}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,200));});return r.json();}).then(function(){msg.className="msg ok";msg.textContent="Submitted. Test verification filed.";btn.textContent="Submitted";}).catch(function(e){msg.className="msg err";msg.textContent="Could not submit ("+e.message+"). Try again.";btn.disabled=false;});
}
E("submitBtn").onclick=submitTest;start();
</script>
</body>
</html>
