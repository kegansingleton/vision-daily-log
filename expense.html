<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Vision Mechanical — Expense / Reimbursement</title>
<style>
:root{--vm:#c0392b;--vm2:#7f1d1d;--ink:#1f2937;--mut:#6b7280;--line:#e5e7eb;--bg:#f4f5f7;--ok:#15803d;--okbg:#dcfce7}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%}
header{background:linear-gradient(135deg,var(--vm),var(--vm2));color:#fff;padding:14px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header .row{display:flex;align-items:center;gap:12px}
header img{height:38px;width:auto;background:#fff;border-radius:8px;padding:4px 6px;box-shadow:0 1px 3px rgba(0,0,0,.2);flex:0 0 auto}
header h1{margin:0;font-size:18px;font-weight:700}header .who{font-size:12px;opacity:.9;margin-top:2px}
.wrap{max-width:720px;margin:0 auto;padding:14px 12px 120px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{margin:0 0 10px;font-size:15px;font-weight:700;color:var(--vm2);display:flex;align-items:center;gap:8px}
label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin:8px 0 4px}
input[type=date],input[type=number],input[type=text]{width:100%;padding:11px;font-size:16px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-family:inherit}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.toggle{display:flex;gap:8px;margin-bottom:4px}
.toggle .t{flex:1;text-align:center;padding:11px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-weight:700;background:#fff;color:var(--mut);cursor:pointer}
.toggle .t.on{background:var(--vm);color:#fff;border-color:var(--vm)}
.item{border:1px solid var(--line);border-radius:10px;padding:12px;margin:10px 0;background:#fafafa}
.item .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.item .top b{font-size:13px;color:var(--vm2)}
.btn-x{background:none;border:none;color:var(--mut);font-size:20px;line-height:1;cursor:pointer;padding:0 4px}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-primary{background:var(--vm);color:#fff}.btn-primary:disabled{opacity:.5}
.btn-ghost{background:#fff;color:var(--vm);border:1.5px dashed var(--vm)}
.tot{display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:var(--vm2);padding:10px 2px 0}
.req{color:var(--vm)}
.foot{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 12px;z-index:40}.foot .inner{max-width:720px;margin:0 auto}
.gate{position:fixed;inset:0;background:linear-gradient(135deg,var(--vm),var(--vm2));display:flex;align-items:center;justify-content:center;z-index:100;color:#fff;text-align:center;padding:24px}
.gate .box{max-width:340px}.gate img{height:74px;width:auto;background:#fff;border-radius:12px;padding:8px 12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.gate h1{font-size:22px;margin:0 0 6px}.gate p{opacity:.9;font-size:14px;margin:0 0 20px}
.gate button{background:#fff;color:var(--vm2);border:none;border-radius:10px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer}
.msg{padding:12px;border-radius:9px;font-size:14px;margin:10px 0;display:none}
.msg.ok{background:var(--okbg);color:var(--ok);display:block}.msg.err{background:#fde8e8;color:#b91c1c;display:block}
</style>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js"></script>
</head>
<body>
<div id="gate" class="gate"><div class="box">
  <img src="https://img1.wsimg.com/isteam/ip/758c2db3-5548-4484-9c69-07d1b4315f5e/logo%20main%20jpg.jpg/:/rs=h:140,m/qt=q:92" alt="Vision Mechanical">
  <h1>Vision Mechanical</h1><p>Expense / Reimbursement. Sign in with your Vision Mechanical account.</p>
  <button id="signin">Sign in with Microsoft</button><div id="gateMsg" style="margin-top:14px;font-size:13px;opacity:.9"></div>
</div></div>
<header><div class="row">
  <img src="https://img1.wsimg.com/isteam/ip/758c2db3-5548-4484-9c69-07d1b4315f5e/logo%20main%20jpg.jpg/:/rs=h:96,m/qt=q:92" alt="Vision Mechanical">
  <div><h1 id="ttl">Expense / Reimbursement</h1><div class="who" id="who"></div></div>
</div></header>
<div class="wrap" id="app" style="display:none">
  <div class="card">
    <h2><span class="n">1</span> Type</h2>
    <div class="toggle"><div class="t on" data-type="Expense">Company Expense</div><div class="t" data-type="Reimbursement">Reimbursement</div></div>
    <div id="ccWrap"><label>Credit card no. (last 4 or card ID)</label><input type="text" id="cc"></div>
    <div class="grid2">
      <div><label>Name <span class="req">*</span></label><input type="text" id="name"></div>
      <div><label>Date <span class="req">*</span></label><input type="date" id="fdate"></div>
    </div>
  </div>
  <div class="card">
    <h2><span class="n">2</span> Line items</h2>
    <div id="items"></div>
    <button class="btn btn-ghost" id="addItem">+ Add line</button>
    <div class="tot"><span>Total</span><span id="tot">$0.00</span></div>
  </div>
  <div class="msg" id="msg"></div>
</div>
<div class="foot" id="foot" style="display:none"><div class="inner"><button class="btn btn-primary" id="submitBtn">Submit</button></div></div>
<script>
var GRAPH_SCOPE="https://graph.microsoft.com/Sites.ReadWrite.All";
var SITE="visionmech.sharepoint.com,ccfe4256-b2bf-4a3b-8e37-50f8021bb3b2,acce7714-1643-4364-86e0-8641745e0281";
var LIST="706e5ee9-648a-4ee0-abe9-187cf44df9cc";
var GRAPH_ITEMS_URL="https://graph.microsoft.com/v1.0/sites/"+SITE+"/lists/"+LIST+"/items";
/* --- Live job list (same source the timecards pull from) --- */
var JOBS_URL="https://graph.microsoft.com/v1.0/sites/"+SITE+"/lists/192b6fd5-5a12-47c1-9d1b-ba4b51e13371/items?$expand=fields($select=JobNo,JobName,Active)&$top=999";
function fillJobList(arr){var dl=document.getElementById("joblist");if(!dl){dl=document.createElement("datalist");dl.id="joblist";document.body.appendChild(dl);}dl.innerHTML=arr.map(function(s){return '<option value="'+String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;')+'"></option>';}).join("");}
var RTOKEN=null;function jobsCacheGet(){try{var r=localStorage.getItem("vm_jobs_v1");if(r){var a=JSON.parse(r);if(Array.isArray(a)&&a.length)return a;}}catch(e){}return null;}function jobsCacheSet(a){try{localStorage.setItem("vm_jobs_v1",JSON.stringify(a));}catch(e){}}function loadJobPicks(){var cached=jobsCacheGet();if(cached)fillJobList(cached);var acct=msal_i.getActiveAccount()||msal_i.getAllAccounts()[0];if(!acct)return;var gp=RTOKEN?Promise.resolve({accessToken:RTOKEN}):msal_i.acquireTokenSilent({scopes:[GRAPH_SCOPE],account:acct});gp.then(function(tok){var seen={},arr=[];function page(u){return fetch(u,{headers:{Authorization:"Bearer "+tok.accessToken}}).then(function(r){return r.json();}).then(function(j){(j.value||[]).forEach(function(it){var fl=it.fields||{};if((fl.Active||"Yes")==="No")return;var jn=(fl.JobNo||"").trim();if(!jn||seen[jn])return;seen[jn]=1;arr.push(jn+" "+(fl.JobName||"").trim());});if(j["@odata.nextLink"])return page(j["@odata.nextLink"]);});}return page(JOBS_URL).then(function(){if(!arr.length)return;arr.sort();fillJobList(arr);jobsCacheSet(arr);});}).catch(function(){});}
var MSAL_CONFIG={auth:{clientId:"ece3c8e3-0f54-49dc-bf83-b46411ade0aa",authority:"https://login.microsoftonline.com/8d64d0b9-91ba-4959-a83c-2e7e8cf233b3",redirectUri:(window.location.origin+window.location.pathname)},cache:{cacheLocation:"localStorage"}};
var msal_i=new msal.PublicClientApplication(MSAL_CONFIG);var loginEmail="";
var formType="Expense";var items=[];
function E(id){return document.getElementById(id);}
function today(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function setType(t){formType=t;document.querySelectorAll(".toggle .t").forEach(function(el){el.classList.toggle("on",el.getAttribute("data-type")===t);});E("ccWrap").style.display=(t==="Expense")?"block":"none";E("ttl").textContent=(t==="Expense")?"Company Expense":"Reimbursement";}
function addItem(){items.push({date:"",project:"",code:"",desc:"",receipt:"",amount:""});render();}
function render(){
  var h="";
  items.forEach(function(it,i){
    h+='<div class="item"><div class="top"><b>Item '+(i+1)+'</b><button class="btn-x" data-del="'+i+'">&times;</button></div>'+
      '<div class="grid2"><div><label>Date</label><input type="date" data-f="date" data-i="'+i+'" value="'+esc(it.date)+'"></div>'+
      '<div><label>Amount ($)</label><input type="number" inputmode="decimal" data-f="amount" data-i="'+i+'" value="'+esc(it.amount)+'"></div></div>'+
      '<div class="grid2"><div><label>Project no.</label><input type="text" list="joblist" data-f="project" data-i="'+i+'" value="'+esc(it.project)+'"></div>'+
      '<div><label>Cost code</label><input type="text" data-f="code" data-i="'+i+'" value="'+esc(it.code)+'"></div></div>'+
      '<label>Description</label><input type="text" data-f="desc" data-i="'+i+'" value="'+esc(it.desc)+'">'+
      '<label>Receipt #</label><input type="text" data-f="receipt" data-i="'+i+'" value="'+esc(it.receipt)+'"></div>';
  });
  E("items").innerHTML=h;
  E("items").querySelectorAll("[data-del]").forEach(function(b){b.onclick=function(){items.splice(+b.getAttribute("data-del"),1);render();};});
  E("items").querySelectorAll("[data-f]").forEach(function(inp){inp.oninput=function(){items[+inp.getAttribute("data-i")][inp.getAttribute("data-f")]=inp.value;total();};});
  total();
}
function total(){var t=0;items.forEach(function(it){t+=parseFloat(it.amount)||0;});E("tot").textContent="$"+t.toFixed(2);}
function showApp(a){E("gate").style.display="none";E("app").style.display="block";E("foot").style.display="block";E("who").textContent=a.username||"";loginEmail=a.username||"";if(!E("name").value)E("name").value=(a.name||"").trim();if(!E("fdate").value)E("fdate").value=today();document.querySelectorAll(".toggle .t").forEach(function(el){el.onclick=function(){setType(el.getAttribute("data-type"));};});if(items.length===0)addItem();loadJobPicks();}
function start(){msal_i.handleRedirectPromise().then(function(resp){RTOKEN=(resp&&resp.accessToken)?resp.accessToken:null;var a=msal_i.getAllAccounts()[0];if(a){msal_i.setActiveAccount(a);showApp(a);}}).catch(function(e){E("gateMsg").textContent="Sign-in problem: "+String(e);});}
E("signin").onclick=function(){msal_i.loginRedirect({scopes:["openid","profile","email",GRAPH_SCOPE]});};
E("addItem").onclick=addItem;
function buildText(a){var L=["VISION MECHANICAL - "+(a.formType==="Expense"?"EXPENSE REPORT":"REIMBURSEMENT FORM"),"========================================","Name: "+a.name,"Date: "+a.fdate];if(a.formType==="Expense")L.push("Credit card: "+a.cc);L.push("");L.push("Date | Project | Cost Code | Description | Receipt # | Amount");a.items.forEach(function(it){L.push((it.date||"-")+" | "+(it.project||"-")+" | "+(it.code||"-")+" | "+(it.desc||"-")+" | "+(it.receipt||"-")+" | $"+((parseFloat(it.amount)||0).toFixed(2)));});L.push("");L.push("TOTAL: $"+a.total.toFixed(2));L.push("Submitted: "+a.submittedAt+" by "+a.loginEmail);L.push("========================================");return L.join("\n");}
function submitForm(){
  var msg=E("msg"),btn=E("submitBtn");
  if(!E("name").value.trim()){msg.className="msg err";msg.textContent="Enter name";return;}
  if(!E("fdate").value){msg.className="msg err";msg.textContent="Pick a date";return;}
  var its=items.filter(function(it){return it.date||it.project||it.desc||it.amount;});
  if(its.length===0){msg.className="msg err";msg.textContent="Add at least one line item";return;}
  var t=0;its.forEach(function(it){t+=parseFloat(it.amount)||0;});
  var a={formType:formType,cc:E("cc").value.trim(),name:E("name").value.trim(),fdate:E("fdate").value,items:its,total:Math.round(t*100)/100,loginEmail:loginEmail,submittedAt:new Date().toLocaleString()};
  var fields={Title:a.formType+" | "+a.name+" | "+a.fdate,FormType:a.formType,EmployeeName:a.name,FormDate:a.fdate+"T12:00:00Z",FormDateText:a.fdate,CreditCardNo:(a.formType==="Expense"?a.cc:""),LineItems:JSON.stringify(a.items),TotalAmount:a.total,SubmittedBy:a.loginEmail,SubmittedAt:a.submittedAt,ReportText:buildText(a)};
  btn.disabled=true;msg.className="msg ok";msg.textContent="Submitting...";
  var acct=msal_i.getActiveAccount()||msal_i.getAllAccounts()[0];
  msal_i.acquireTokenSilent({scopes:[GRAPH_SCOPE],account:acct}).catch(function(){msal_i.acquireTokenRedirect({scopes:[GRAPH_SCOPE]});return new Promise(function(){});}).then(function(tok){return fetch(GRAPH_ITEMS_URL,{method:"POST",headers:{Authorization:"Bearer "+tok.accessToken,"Content-Type":"application/json"},body:JSON.stringify({fields:fields})});}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error("HTTP "+r.status+" "+t.slice(0,200));});return r.json();}).then(function(){msg.className="msg ok";msg.textContent="Submitted. Sent to accounting.";btn.textContent="Submitted";}).catch(function(e){msg.className="msg err";msg.textContent="Could not submit ("+e.message+"). Try again.";btn.disabled=false;});
}
E("submitBtn").onclick=submitForm;start();
</script>
</body>
</html>
